<svg xmlns="http://www.w3.org/2000/svg" width="200" height="200" viewBox="0 0 200 200">
  <!-- Minimal Color Personality Logo -->
  <!-- Four season dots arranged in a diamond pattern -->
  <circle cx="100" cy="50" r="22" fill="#FF8A6B" opacity="0.9"/>
  <circle cx="50" cy="100" r="22" fill="#6BC5A0" opacity="0.9"/>
  <circle cx="150" cy="100" r="22" fill="#FFD166" opacity="0.9"/>
  <circle cx="100" cy="150" r="22" fill="#7B8CDE" opacity="0.9"/>
  <!-- Center connecting dot -->
  <circle cx="100" cy="100" r="12" fill="#1a1a1a"/>
</svg>
